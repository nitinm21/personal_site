  <text x="286" y="558" fill="#625E5C" font-family="Arial, sans-serif" font-size="34" font-weight="600">Si yo no te escribo, t&#250; no me escribe&apos;, ey</text>

  <text x="286" y="726" fill="#F5F0EA" font-family="Arial, sans-serif" font-size="58" font-weight="700">If you want, I&apos;ll come find you, I know where you live</text>
